#Default port
server.port=9000

# ==============================================================================
# APPLICATION METADATA
# ==============================================================================
# Sets the unique logical identifier for this Spring Boot application.
# This name is utilized by actuator endpoints, logging contexts, and service registries.
spring.application.name=spring-security-demo

# ==============================================================================
# DEFAULT SPRING SECURITY USER CREDENTIALS
# ==============================================================================
# Replaces Spring Security's automatically generated, random security password
# on startup with explicit, static fallback credentials.
# NOTE: These fallback credentials will be ignored completely if you register a custom
# UserDetailsService or InMemoryUserDetailsManager bean in your application.
spring.security.user.name=uma
spring.security.user.password=uma@123

# ==============================================================================
# SPRINGDOC / OPENAPI (SWAGGER) ARCHITECTURE CONFIGURATIONS
# ==============================================================================
# Disables the automatic generation of the raw OpenAPI 3 JSON/YAML specifications endpoint.
springdoc.api-docs.enabled=false

# Disables the generation and exposure of the interactive Swagger UI dashboard web page.
# Shutting both of these down is common practice in production to minimize the API attack surface.
springdoc.swagger-ui.enabled=false

# ==============================================================================
# DATA SOURCE CONFIGURATION (H2 IN-MEMORY DATABASE)
# ==============================================================================
# Defines the JDBC Connection URL to point to an embedded, in-memory H2 instance.
# - 'jdbc:h2:mem:uma': Spins up an isolated instance named "uma" running purely inside JVM RAM.
# - ';DB_CLOSE_DELAY=-1': Crucial parameter preventing H2 from instantly dropping its entire schema
#   and data structure the second the last active application thread closes its connection.
spring.datasource.url=jdbc:h2:mem:uma;DB_CLOSE_DELAY=-1

# Specifies the fully qualified Java class name of the H2 JDBC driver used to translate database operations.
spring.datasource.driverClassName=org.h2.Driver

# Defines the default Administrative credentials required to authenticate and open a connection pool with H2.
spring.datasource.username=sa
spring.datasource.password=sa

# ==============================================================================
# H2 BROWSER-BASED ADMINISTRATIVE WEB CONSOLE SETTINGS
# ==============================================================================
# Instructs Spring Boot to spin up an embedded web-based user interface servlet for managing the database.
spring.h2.console.enabled=true

# Customizes the relative network endpoint URI path where developers can access the H2 GUI console dashboard.
# Assuming your server port is default, this will render at: http://localhost:9000/h2-console
spring.h2.console.path=/h2-console

# ==============================================================================
# SPRING DATA JPA / HIBERNATE ENGINE SETTINGS
# ==============================================================================
# Explicitly instructs the Hibernate ORM engine to generate precise SQL syntax tailored
# exclusively to the structural capabilities and dialects of the H2 Database.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Configures Hibernate's Data Definition Language (DDL) generation lifecycle policy on startup.
# 'update': Inspects your Java @Entity classes on application launch and automatically modifies
# or appends new tables/columns to the database schema without wiping pre-existing user data.
spring.jpa.hibernate.ddl-auto=update

# When set to true, it logs raw, formatted SQL queries generated by Hibernate directly into the
# application console stdout stream—invaluable for debugging performance bottlenecks and query tracking.
spring.jpa.show-sql=true

# ==============================================================================
# SPRING BOOT ACTUATOR MANAGEMENT METRICS
# ==============================================================================
# Configures the exposure level of the /actuator/health management safety endpoint.
# 'always': Forces Spring Boot to expose complete system component breakdowns (disk space,
# database connectivity status, etc.) in the JSON response, rather than returning a simple {"status": "UP"}.
management.endpoint.health.show-details=always