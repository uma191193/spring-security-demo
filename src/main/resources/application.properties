# ==============================================================================
# SERVER NETWORK CONFIGURATION
# ==============================================================================
# server.port -> Specifies the network port on which the embedded Tomcat server will listen.
# Changing it from the default 8080 prevents port conflicts if multiple applications run locally.
server.port=9000

# ==============================================================================
# APPLICATION METADATA
# ==============================================================================
# spring.application.name -> Sets a unique logical identifier for this Spring Boot application.
# It acts as a central registry key used by service locators (like Eureka), logging patterns,
# distributed tracing systems (like Zipkin), and actuator management reporting.
spring.application.name=spring-security-demo

# ==============================================================================
# DEFAULT SPRING SECURITY USER CREDENTIALS
# ==============================================================================
# Replaces Spring Security's automatically generated, random security password
# on startup with explicit, static fallback credentials.
# NOTE: These fallback credentials will be ignored completely if you register a custom
# UserDetailsService or InMemoryUserDetailsManager bean in your application.
#spring.security.user.name=uma
#spring.security.user.password=uma@123

# ==============================================================================
# SPRINGDOC / OPENAPI (SWAGGER) ARCHITECTURE CONFIGURATIONS
# ==============================================================================
# springdoc.api-docs.enabled -> Toggles the automatic generation of raw OpenAPI 3 specifications.
# When set to false, endpoints like /v3/api-docs (which reveal the entire structure of your API
# endpoints, request bodies, and payloads) are disabled entirely to hide data models from scanners.
springdoc.api-docs.enabled=false

# springdoc.swagger-ui.enabled -> Controls the exposure of the interactive Swagger HTML UI webpage.
# Setting this to false turns off the graphical browser dashboard. Disabling both api-docs
# and swagger-ui in staging/production environments minimizes the API attack surface against attackers.
springdoc.swagger-ui.enabled=false

# =============================================================
# MYSQL DATABASE CONFIGURATION
# =============================================================
# spring.datasource.url -> The Java Database Connectivity (JDBC) connection endpoint string.
# Format: jdbc:<db_type>://<host>:<port>/<database_name>
# This points directly to your local MySQL instance on port 3306 targeting the schema named 'practice'.
spring.datasource.url=jdbc:mysql://localhost:3306/practice

# spring.datasource.driverClassName -> Informs Spring Boot which specific database manufacturer jar
# file driver to use to open communications. 'com.mysql.cj.jdbc.Driver' is the modern Type-4 JDBC
# driver utilized for MySQL 5.7 and MySQL 8+ systems.
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# spring.datasource.username & password -> The access control credentials passed securely
# to the MySQL server instance when establishing a database connection pool.
spring.datasource.username=uma
spring.datasource.password=uma@123

# =============================================================
# JPA / HIBERNATE SETTINGS
# =============================================================

# Explicitly tells Hibernate to use modern MySQL 8+ SQL syntax
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ------------------------------------------------------------------------------
# UNDERSTANDING HIBERNATE DDL-AUTO OPTIONS:
# ------------------------------------------------------------------------------
# This property controls how Hibernate manages database schema changes on application startup.
# Choose your setting carefully depending on your environment (Development vs. Production).
#
# 1. ddl-auto=create
#    -> Action: Drops existing tables, then creates fresh new tables on startup.
#    -> Use Case: Excellent for fresh testing cycles or fixing id alignment gaps.
#    -> DANGER: YOU WILL LOSE ALL EXISTING DATA EVERY TIME THE APPLICATION RESTARTS.
#
# 2. ddl-auto=create-drop
#    -> Action: Drops existing tables, creates new ones on startup, AND drops them again when the app cleanly shuts down.
#    -> Use Case: Typically used for automated integration test suites (like @SpringBootTest).
#    -> DANGER: Data only exists while the application JVM is running.
#
# 3. ddl-auto=update (Most common for local active development)
#    -> Action: Compares your Java @Entity classes with existing DB tables. It creates missing tables
#               or adds new columns, but will NEVER delete existing tables or columns.
#    -> Use Case: Modifying models seamlessly without losing mock/test data during development.
#    -> CAVEAT: It won't alter existing column types if they conflict, and can leave orphaned columns if you rename fields.
#
# 4. ddl-auto=validate
#    -> Action: Checks if your Java @Entity structures match the database tables. If there is a mismatch
#               (e.g., a missing column or incorrect data type), the application crashes immediately.
#    -> Use Case: Great for Staging or Production environments. It ensures your Java code aligns with the schema.
#    -> SAFETY: It makes ZERO modifications to your database.
#
# 5. ddl-auto=none (or simply comment out the property)
#    -> Action: Hibernate does absolutely nothing to the database structure.
#    -> Use Case: MANDATORY FOR PRODUCTION. Schema updates should be handled via dedicated migration
#                 tools like Liquibase or Flyway, or executed manually by a DBA.
# ------------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=update

# spring.jpa.show-sql -> An interceptor flag that intercepts SQL statements processed by
# the Hibernate engine and prints them directly into the standard console output log (STDOUT).
# Crucial for verifying query performance, identifying N+1 join issues, and checking column mappings.
spring.jpa.show-sql=true

# ==============================================================================
# SPRING BOOT ACTUATOR MANAGEMENT METRICS
# ==============================================================================
# management.endpoint.health.show-details -> Configures the safety disclosure level
# of the Spring Boot Actuator monitoring endpoint (/actuator/health).
# Options:
# - 'never': Only returns a simple, high-level status indicator summary: {"status": "UP"}
# - 'always': Forces Actuator to return a granular breakdown of individual downstream component health.
#   It explicitly evaluates details like free server disk space, active database connection statuses,
#   ping responses, and mail servers. Ideal for dev monitoring, but should be handled securely in production.
management.endpoint.health.show-details=always